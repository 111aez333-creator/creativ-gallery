<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصتي الإبداعية العالمية</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#00adb5">
    
    <meta name="description" content="منصتي الإبداعية العالمية - منصة اجتماعية مبتكرة لعرض ومشاركة أعمال الأنمي، الشعارات، والمناظر الطبيعية.">
    <meta name="keywords" content="منصة إبداعية, معرض أعمال, صور أنمي, تصميم شعارات, مناظر طبيعية, مشاركة الصور, معرض إبداعي">
    <meta name="google-site-verification" content="google2c40469fe65033ae" />

    <link rel="canonical" href="https://111aez333-creator.github.io/creativ-gallery/">
    <link rel="manifest" href="manifest.json">
    <meta name="robots" content="index, follow">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://111aez333-creator.github.io/creativ-gallery/">
    <meta property="og:title" content="منصتي الإبداعية العالمية">
    <meta property="og:description" content="منصة اجتماعية مبتكرة لعرض ومشاركة أعمال الأنمي، الشعارات، والمناظر الطبيعية.">
    <meta property="og:locale" content="ar_AR">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght=400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00adb5; --bg: #0f0f0f; --text: #ffffff; --card-bg: #1a1a1a; --border: #333; --header-bg: #111; }
        .light-mode { --bg: #f5f6fa; --text: #2f3640; --card-bg: #ffffff; --border: #dcdde1; --header-bg: #ffffff; }
        
        body { background-color: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; padding: 20px; transition: background 0.3s, color 0.3s; }
        
        #login-screen { text-align: center; padding-top: 20vh; display: none; }
        #main-gallery { display: block; animation: fadeIn 0.8s; }

        .google-btn { 
            background: #111111; border: 1px solid #333; color: white; padding: 14px 35px; cursor: pointer; 
            border-radius: 30px; font-family: 'Cairo', sans-serif; font-size: 16px; display: inline-flex; align-items: center; gap: 15px; transition: 0.3s;
        }
        .google-btn:hover { background: #1a1a1a; border-color: var(--accent); box-shadow: 0 0 15px rgba(0,173,181,0.2); }

        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: var(--header-bg); border-radius: 15px; margin-bottom: 25px; border: 1px solid var(--border); }
        .header-actions { display: flex; align-items: center; gap: 20px; }
        
        .theme-btn { background: none; border: 1px solid var(--border); color: var(--text); padding: 5px 12px; border-radius: 20px; cursor: pointer; font-family: 'Cairo'; font-size: 13px; }

        .noti-wrapper { position: relative; cursor: pointer; font-size: 20px; }
        .noti-badge { position: absolute; top: -5px; right: -10px; background: #ff4757; color: white; font-size: 11px; padding: 2px 6px; border-radius: 50%; font-weight: bold; }
        .noti-dropdown { display: none; position: absolute; top: 30px; left: 0; background: var(--card-bg); border: 1px solid var(--border); min-width: 250px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 100; max-height: 200px; overflow-y: auto; }
        .noti-item { padding: 10px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text); text-align: right; }
        .noti-item:hover { background: rgba(0,173,181,0.1); }

        .search-container { max-width: 600px; margin: 0 auto 25px; display: flex; gap: 10px; }
        .search-input { flex-grow: 1; padding: 10px 20px; border-radius: 25px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-family: 'Cairo'; }
        
        .controls { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        .filter-btn { background: var(--card-bg); border: 1px solid var(--border); color: var(--text); padding: 10px 25px; cursor: pointer; border-radius: 25px; transition: 0.3s; font-family: 'Cairo', sans-serif; }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; box-shadow: 0 0 15px rgba(0,173,181,0.4); }
        .filter-btn.profile-btn { border-color: #ffb703; color: #ffb703; }
        .filter-btn.profile-btn.active { background: #ffb703; color: #000; box-shadow: 0 0 15px rgba(255,183,3,0.4); }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; padding: 20px; }
        .photo-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; position: relative; display: flex; flex-direction: column; }
        .photo-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        
        .photo-img { width: 100%; height: 230px; object-fit: cover; cursor: pointer; transition: 0.2s; }
        .photo-img:hover { filter: brightness(0.85); }
        
        .photo-title { margin: 14px 15px 5px; font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.4; }
        .photo-header { display: flex; align-items: center; gap: 10px; padding: 10px 15px 0; }
        
        .avatar-img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }
        .avatar-img-small { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }

        .user-tag { background: rgba(0, 0, 0, 0.7); color: #fff; padding: 5px 10px; font-size: 12px; border-radius: 20px; position: absolute; top: 10px; left: 10px; border: 1px solid #444; cursor: pointer; z-index: 10; display: flex; align-items: center; gap: 5px; }
        .user-tag:hover { background: var(--accent); color: white; }
        
        .del-btn { position: absolute; top: 10px; right: 10px; background: #ff4757; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; display: none; z-index: 10; }
        .photo-card:hover .del-btn { display: block; }

        .tags-container { padding: 0 15px 10px; display: flex; flex-wrap: wrap; gap: 5px; }
        .tag-badge { background: rgba(0,173,181,0.1); color: var(--accent); font-size: 11px; padding: 2px 8px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .tag-badge:hover { background: var(--accent); color: #fff; }

        .interaction-bar { padding: 10px 15px; text-align: center; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); }
        .like-container { display: flex; align-items: center; gap: 5px; cursor: pointer; background: none; border: none; color: var(--text); font-family: 'Cairo'; font-size: 14px; }
        .like-btn { background: none; border: none; cursor: pointer; font-size: 18px; padding: 0; color: var(--text); pointer-events: none; }
        .like-btn.liked { color: #ff4757; transform: scale(1.2); }
        
        .share-actions { display: flex; gap: 8px; }
        .share-btn { background: none; border: 1px solid var(--border); border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .share-btn:hover { border-color: var(--accent); }

        .comments-section { padding: 15px; background: var(--bg); border-top: 1px solid var(--border); flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .comments-list { max-height: 200px; overflow-y: auto; font-size: 13px; margin-bottom: 10px; padding-left: 5px; }
        .comment-item { margin-bottom: 12px; border-bottom: 1px dashed var(--border); padding-bottom: 8px; text-align: right; }
        .comment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .comment-user-box { display: flex; align-items: center; gap: 6px; }
        .comment-user { color: var(--accent); font-weight: bold; }
        .comment-actions button { background: none; border: none; cursor: pointer; font-size: 12px; margin-right: 5px; padding: 0; }
        
        .replies-list { margin-right: 20px; border-right: 2px solid var(--border); padding-right: 10px; margin-top: 8px; }
        .reply-item { background: rgba(255,255,255,0.02); padding: 5px 8px; border-radius: 5px; margin-bottom: 5px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
        
        .comment-input-box, .reply-input-box { display: flex; gap: 5px; }
        .comment-input-box input, .reply-input-box input { flex-grow: 1; background: var(--card-bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 20px; font-family: 'Cairo', sans-serif; font-size: 12px; }
        .comment-btn, .reply-btn { background: var(--accent); border: none; color: white; padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; font-family: 'Cairo', sans-serif; }

        .lightbox-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 9999; justify-content: center; align-items: center; cursor: pointer; }
        .lightbox-overlay img { max-width: 90%; max-height: 90%; border-radius: 8px; box-shadow: 0 0 25px rgba(255,255,255,0.1); cursor: default; }
        .close-box { position: absolute; top: 25px; right: 35px; color: #fff; font-size: 40px; font-weight: bold; cursor: pointer; }

        .drag-drop-zone { border: 2px dashed var(--border); padding: 25px; border-radius: 15px; cursor: pointer; text-align: center; transition: 0.3s; margin-bottom: 30px; }
        .drag-drop-zone.highlight { border-color: var(--accent); background: rgba(0, 173, 181, 0.05); }

        .spinner { display: none; border: 4px solid rgba(255,255,255,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: var(--accent); animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="lightbox-overlay" id="customLightbox">
    <span class="close-box" id="closeLightboxBtn">&times;</span>
    <img id="customLightboxImg" src="">
</div>

<!-- شريط الدخول السريع في الأعلى -->
<div id="login-bar" style="display:none; background:#ffb703; color:#000; text-align:center; padding:10px; font-weight:bold; font-size:14px;">
    أنت تتصفح كمشاهد حالياً. 
    <button id="login-bar-btn" style="background:#000; color:#fff; border:none; padding:3px 12px; margin-right:10px; border-radius:15px; cursor:pointer; font-family:'Cairo'; font-size:12px;">تسجيل الدخول للتفاعل والرفع</button>
</div>

<div id="login-screen">
    <div style="background:var(--card-bg); border:1px solid var(--border); padding:30px; display:inline-block; border-radius:15px; position:relative;">
        <button id="close-login-screen" style="position:absolute; top:10px; left:15px; background:none; border:none; color:var(--text); font-size:20px; cursor:pointer;">×</button>
        <h2 style="margin-bottom: 25px;">أهلاً بك في منصتك الإبداعية الاجتماعية</h2>
        <button class="google-btn" id="google-login">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" style="width:22px; height:22px;">
            متابعة باستخدام جوجل
        </button>
    </div>
</div>

<div id="main-gallery">
    <div class="header-bar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img id="header-avatar" src="" style="width: 35px; height: 35px; border-radius: 50%; object-fit: cover; display: none;">
            <h2 id="welcome-msg" style="margin: 0; font-size: 17px;">زائر المنصة</h2>
        </div>
        <div class="header-actions">
            <button class="theme-btn" id="theme-toggle-btn">🌓 تبديل المظهر</button>
            
            <div class="noti-wrapper" id="noti-wrapper-area" style="display:none;">
                🔔 <span class="noti-badge" id="noti-count" style="display:none;">0</span>
                <div class="noti-dropdown" id="noti-dropdown">
                    <div style="padding:10px; font-weight:bold; border-bottom:1px solid var(--border); font-size:13px; color:var(--accent);">الإشعارات الأخيرة</div>
                    <div id="noti-list"></div>
                </div>
            </div>
            <button id="logout-btn" style="display:none; background:transparent; border:1px solid #ff4757; color:#ff4757; padding:5px 15px; border-radius:5px; cursor:pointer; font-family: 'Cairo', sans-serif;">خروج</button>
            <button id="login-nav-btn" style="background:var(--accent); border:none; color:white; padding:5px 15px; border-radius:5px; cursor:pointer; font-family: 'Cairo', sans-serif;">دخول</button>
        </div>
    </div>

    <!-- لوحة تحكم الإشراف الخاصة بالمسؤول -->
    <div id="admin-panel" style="display:none; text-align:center; margin-bottom: 25px; border: 1px solid #ff4757; padding: 15px; border-radius: 15px; background: rgba(255, 71, 87, 0.05);">
        <h3 style="color: #ff4757; margin: 0 0 10px 0;">لوحة تحكم الإدارة 🛡️</h3>
        <p style="font-size: 13px; margin: 0 0 15px 0;">يمكنك فحص البلاغات المسجلة في النظام وحذف المنشورات المخالفة تلقائياً بضغطة زر.</p>
        <button class="filter-btn" id="auto-moderate-btn" style="border-color: #ff4757; color: #ff4757; margin-bottom:0;">⚡ تشغيل المشرف الآلي (حذف عند 5 بلاغات)</button>
    </div>

    <!-- محرك البحث -->
    <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="🔍 ابحث بالوسوم، التصنيف، العنوان أو المصمم...">
        <button class="filter-btn" id="search-btn" style="margin-bottom: 0;">بحث</button>
    </div>
    
    <div class="controls">
        <button class="filter-btn active" id="btn-all" data-category="الكل">الكل</button>
        <button class="filter-btn" data-category="أنمي">أنمي</button>
        <button class="filter-btn" data-category="مناظر">مناظر</button>
        <button class="filter-btn" data-category="شعارات">شعارات</button>
        <button class="filter-btn" id="btn-trending" data-category="trending" style="border-color: #ff4757; color: #ff4757;">🏆 الأكثر رواجاً</button>
        <button class="filter-btn profile-btn" id="btn-my-posts" data-category="منشوراتي" style="display:none;">👤 منشوراتي</button>
    </div>

    <!-- مؤشر و إحصائيات الملف الشخصي المختار -->
    <div id="profile-view-indicator" style="display:none; text-align:center; margin-bottom:25px; border:1px solid #ffb703; padding: 15px; border-radius: 15px; background: rgba(255,183,3,0.05);">
        <div id="profile-user-info"></div>
        <button id="clear-profile-filter-btn" style="background:none; border:1px solid #ffb703; color:#ffb703; padding:4px 15px; margin-top:10px; border-radius:15px; cursor:pointer; font-family:'Cairo'; font-size:12px;">العودة للمعرض العام ×</button>
    </div>

    <!-- منطقة الرفع المحدثة لدعم السحب والإفلات والوسوم -->
    <div id="upload-section-box" class="drag-drop-zone" style="display: none;">
        <p style="margin: 0 0 10px 0;">اسحب وأفلت الصورة هنا أو انقر لاختيارها</p>
        <input type="file" id="upload" accept="image/*" style="display:none;">
        <button class="filter-btn" id="select-file-btn" style="padding: 5px 15px; margin-bottom: 10px;">اختر ملف</button>
        
        <div style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 10px;">
            <select id="catSelect" style="padding: 10px; border-radius: 5px; background:var(--card-bg); color:var(--text); border:1px solid var(--border); font-family:'Cairo';">
                <option value="أنمي">أنمي</option>
                <option value="مناظر">مناظر</option>
                <option value="شعارات">شعارات</option>
            </select>
            <input type="text" id="tagInput" placeholder="الوسوم (مثال: تصميم، شمس، جبل)" style="padding: 10px; border-radius: 5px; background:var(--card-bg); color:var(--text); border:1px solid var(--border); font-family:'Cairo'; width: 250px;">
        </div>
        <div class="spinner" id="uploadSpinner"></div>
        <p id="upload-status" style="margin-top: 10px; color: var(--accent); font-weight: bold;"></p>
    </div>

    <div class="gallery-grid" id="gallery"></div>
    <div style="text-align:center; margin: 25px 0;">
        <button id="load-more-btn" style="display:none; background:var(--accent); border:none; color:white; padding:10px 30px; border-radius:25px; cursor:pointer; font-family:'Cairo', sans-serif; font-size:14px;">تحميل المزيد ⬇️</button>
        <p id="load-more-status" style="color:var(--accent); font-size:13px; margin-top:8px;"></p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getFirestore, collection, collectionGroup, addDoc, setDoc, getDoc, getDocs, deleteDoc, doc, updateDoc, query, where, orderBy, onSnapshot, limit, startAfter, documentId, writeBatch } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

    /*
     * 🔒 إرشادات أمنية هامة لحماية مفاتيح واجهة التطبيقات (API Keys):
     * نظراً لأن منصات استضافة المواقع الثابتة مثل GitHub Pages تقوم بعرض الكود المصدري للمتصفح بالكامل،
     * نوصي باتباع الخطوات التالية لتأمين المفاتيح في منصة جوجل السحابية (Google Cloud Console):
     * 1. توجه إلى منصة Google Cloud Console -> APIs & Services -> Credentials.
     * 2. اختر مفتاح واجهة برمجة التطبيقات (API Key) المرتبط بمشروع Firebase الخاص بك.
     * 3. ضمن قسم "Key restrictions" (قيود المفتاح)، قم بتمكين خيار "Website restrictions" (قيود مواقع الويب).
     * 4. أضف نطاق موقعك بالكامل: https://111aez333-creator.github.io/* لضمان منع استخدام المفتاح على أي موقع آخر.
     */
    const firebaseConfig = {
        apiKey: import.meta.env?.VITE_FIREBASE_API_KEY || "AIzaSyAE6bFNg2UoTuX_3fpg-6qGIYptrPjomvI",
        authDomain: import.meta.env?.VITE_FIREBASE_AUTH_DOMAIN || "my-creative-gallery.firebaseapp.com",
        projectId: import.meta.env?.VITE_FIREBASE_PROJECT_ID || "my-creative-gallery",
        messagingSenderId: import.meta.env?.VITE_FIREBASE_MESSAGING_SENDER_ID || "747786841776",
        appId: import.meta.env?.VITE_FIREBASE_APP_ID || "1:747786841776:web:1c24ebf88b404a85b59575",
        measurementId: import.meta.env?.VITE_FIREBASE_MEASUREMENT_ID || "G-2CM6BJJ53K"
    };

    const IMGBB_API_KEY = import.meta.env?.VITE_IMGBB_API_KEY || "2b3d2c06ed007ca38badaa8f97614954";

    const ADMIN_UID = "747786841776";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const escapeHtml = (str) => {
        if (str === null || str === undefined) return "";
        return String(str)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    };

    const supportsWebP = (() => {
        try {
            const c = document.createElement('canvas');
            return c.toDataURL('image/webp').indexOf('data:image/webp') === 0;
        } catch (e) { return false; }
    })();

    const PAGE_SIZE = 12;
    let pageState = { filter: 'الكل', searchQuery: '', lastDoc: null, hasMore: true, loading: false };
    let galleryImages = {};
    let unsubscribeNoti = null;
    let currentNotiDocs = [];

    const fetchWithRetry = async (url, options, retries = 3, delay = 1500) => {
        try {
            const response = await fetch(url, options);
            if (!response.ok) throw new Error(`HTTP Error Status: ${response.status}`);
            return response;
        } catch (error) {
            if (retries > 0) {
                console.warn(`انقطع الاتصال بالشبكة. جاري إعادة المحاولة خلال ${delay}ms... المحاولات المتبقية: ${retries}`);
                await new Promise(res => setTimeout(res, delay));
                return fetchWithRetry(url, options, retries - 1, delay * 2);
            }
            throw error;
        }
    };

    const syncUserProfile = async (user) => {
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);
        
        let joinedAtValue = Date.now();
        if (userSnap.exists() && userSnap.data().joinedAt) {
            joinedAtValue = userSnap.data().joinedAt;
        }

        await setDoc(userRef, {
            uid: user.uid,
            displayName: user.displayName || "مستخدم مجهول",
            photoURL: user.photoURL || "",
            joinedAt: joinedAtValue
        }, { merge: true });
    };

    const openLightboxImage = (event, src, imgId, isAutoOpen) => {
        if(event) event.preventDefault();
        document.getElementById('customLightboxImg').src = src;
        document.getElementById('customLightbox').style.display = 'flex';
        if (imgId && !isAutoOpen) {
            history.pushState({ photoId: imgId }, '', `#photo-${imgId}`);
        }
    };

    const closeLightboxImage = (event) => {
        if(event) event.preventDefault();
        document.getElementById('customLightbox').style.display = 'none';
        if (window.location.hash.startsWith('#photo-')) {
            history.pushState('', document.title, window.location.pathname + window.location.search);
        }
    };

    const listenToNotifications = (currentUserId) => {
        if (unsubscribeNoti) unsubscribeNoti();
        // نجلب آخر 30 إشعاراً فقط مرتبة حسب الأحدث لتفادي نمو غير محدود في القراءات
        const qNoti = query(
            collection(db, "notifications"),
            where("toUserId", "==", currentUserId),
            orderBy("timestamp", "desc"),
            limit(30)
        );
        unsubscribeNoti = onSnapshot(qNoti, (snapshot) => {
            const badge = document.getElementById('noti-count');
            const list = document.getElementById('noti-list');

            currentNotiDocs = snapshot.docs.map(d => ({ id: d.id, ref: d.ref, data: d.data() }));

            if (snapshot.empty) {
                badge.style.display = 'none';
                list.innerHTML = `<div style="padding:15px; text-align:center; color:#666; font-size:12px;">لا توجد إشعارات بعد...</div>`;
                return;
            }

            const unreadCount = currentNotiDocs.filter(n => !n.data.read).length;
            if (unreadCount > 0) {
                badge.innerText = unreadCount;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }

            list.innerHTML = "";
            currentNotiDocs.forEach(({ data: noti, id }) => {
                let icon = "🔔";
                let actionText = "";
                if (noti.type === "like") { icon = "❤️"; actionText = "أعجب بصورتك."; }
                else if (noti.type === "comment") { icon = "💬"; actionText = `علّق على صورتك: "${escapeHtml(noti.commentText)}"`; }
                else if (noti.type === "reply") { icon = "↩️"; actionText = `رد على تعليقك: "${escapeHtml(noti.commentText)}"`; }

                const unreadStyle = noti.read ? "" : "background: rgba(0,173,181,0.08); font-weight: bold;";
                list.innerHTML += `<div class="noti-item" id="noti-item-${id}" style="${unreadStyle}">${icon} <b>${escapeHtml(noti.fromUserName)}</b> ${actionText}</div>`;
            });
        });
    };

    // تُستدعى عند فتح قائمة الإشعارات: تُبقي الإشعارات القديمة في القائمة لكن تُعلّمها كمقروءة
    // فيختفي عدّاد "الجديد" (badge) ولا تعود تُحتسب ضمن غير المقروء لاحقاً
    const markNotificationsRead = async () => {
        const unread = currentNotiDocs.filter(n => !n.data.read);
        if (unread.length === 0) return;

        // تحديث فوري في الواجهة قبل استجابة الخادم لإحساس أسرع بالاستجابة
        const badge = document.getElementById('noti-count');
        if (badge) badge.style.display = 'none';
        unread.forEach(n => {
            const el = document.getElementById(`noti-item-${n.id}`);
            if (el) el.style.cssText = "";
        });

        try {
            const batch = writeBatch(db);
            unread.forEach(n => batch.update(n.ref, { read: true }));
            await batch.commit();
        } catch (error) {
            console.error("فشل تحديث حالة الإشعارات كمقروءة:", error);
        }
    };

    const loadProfileStats = async (userId) => {
        const indicator = document.getElementById('profile-view-indicator');
        const userInfoBox = document.getElementById('profile-user-info');
        
        indicator.style.display = 'block';
        userInfoBox.innerHTML = "جاري تحميل إحصائيات الملف الشخصي...";

        try {
            const userSnap = await getDoc(doc(db, "users", userId));
            let joinedDateStr = "غير محدد";
            let userAvatar = "";
            let dispName = "مبدع المنصة";
            if (userSnap.exists()) {
                const uData = userSnap.data();
                dispName = uData.displayName;
                userAvatar = uData.photoURL;
                if (uData.joinedAt) {
                    joinedDateStr = new Date(uData.joinedAt).toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' });
                }
            }

            const qPics = query(collection(db, "images"), where("userId", "==", userId));
            const picsSnap = await getDocs(qPics);
            const totalPosts = picsSnap.size;
            let totalLikesReceived = 0;
            picsSnap.forEach(p => {
                const d = p.data();
                totalLikesReceived += d.likes ? d.likes.length : 0;
            });

            userInfoBox.innerHTML = `
                <div style="display:flex; align-items:center; justify-content:center; gap:15px; flex-wrap:wrap;">
                    <img src="${escapeHtml(userAvatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(dispName))}" style="width:65px; height:65px; border-radius:50%; border:2px solid var(--accent); object-fit:cover;">
                    <div style="text-align:right;">
                        <h3 style="margin:0 0 5px 0;">${escapeHtml(dispName)}</h3>
                        <div style="font-size:13px; color:var(--text); display:flex; gap:15px; flex-wrap:wrap;">
                            <span>📸 <b>${totalPosts}</b> منشورات</span>
                            <span>❤️ <b>${totalLikesReceived}</b> إجمالي الإعجابات</span>
                            <span>📅 انضم في: <b>${joinedDateStr}</b></span>
                        </div>
                    </div>
                </div>
            `;
        } catch (error) {
            userInfoBox.innerHTML = "فشل تحميل معلومات العضو.";
        }
    };

    const viewUserProfile = async (userId) => {
        await loadProfileStats(userId);
        render({ specialFilter: 'otherUser', targetUid: userId });
    };

    const render = async (filter = 'الكل', btn = null) => {
        if(btn) { 
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); 
            btn.classList.add('active'); 
        }
        pageState = { filter, searchQuery: document.getElementById('search-input').value.trim(), lastDoc: null, hasMore: true, loading: false };
        document.getElementById('gallery').innerHTML = "";
        const loadMoreBtn = document.getElementById('load-more-btn');
        if (loadMoreBtn) loadMoreBtn.style.display = 'none';
        await loadImagesPage(false);
    };

    const loadMoreImages = () => loadImagesPage(true);

    /*
     * 📈 تحسين الأداء وعمليات القراءة (Reads) للنمو الضخم (Scaling):
     * تقوم دالة loadImagesPage حالياً بجمع معرّفات الصور المعروضة وجلب تعليقاتها على دفعات (Batching) مكونة من 10 لتجنب الاستعلامات الفردية المتكررة.
     * مع نمو قاعدة البيانات، يوصى باتباع إحدى الاستراتيجيتين التاليتين:
     * 1. استخدام "إلغاء التطبيع" (Denormalization): حفظ حقل "commentCount" وآخر 3 تعليقات بشكل مصفوفة فرعية مباشرة داخل وثيقة الصورة في مجموعة "images".
     * 2. استخدام Cloud Functions: تشغيل وظيفة سحابية تقوم بتحديث هذا الدمج التلقائي عند كل إضافة تعليق جديدة.
     * هذا الأسلوب يقلل عمليات القراءة بنسبة 90%، حيث يتم جلب الصورة مع بيانات تعليقاتها الأولية في استعلام واحد فقط.
     */
    const loadImagesPage = async (append) => {
        if (pageState.loading || (append && !pageState.hasMore)) return;
        pageState.loading = true;

        const filter = pageState.filter;
        const searchQuery = pageState.searchQuery;
        const gallery = document.getElementById('gallery');
        const loadMoreBtn = document.getElementById('load-more-btn');
        const loadMoreStatus = document.getElementById('load-more-status');

        if (!append) gallery.innerHTML = "جاري تحميل المنصة...";
        else if (loadMoreStatus) loadMoreStatus.innerText = "جاري تحميل المزيد...";
        if (loadMoreBtn) loadMoreBtn.disabled = true;

        const myId = auth.currentUser ? auth.currentUser.uid : null;
        let baseConstraints = [];

        if (filter && filter.specialFilter === 'otherUser') {
            baseConstraints = [where("userId", "==", filter.targetUid)];
        } else if (filter === 'منشوراتي') {
            if(!myId) { pageState.loading = false; return; }
            document.getElementById('profile-view-indicator').style.display = 'none';
            baseConstraints = [where("userId", "==", myId)];
        } else if (filter !== 'الكل' && filter !== 'trending') {
            document.getElementById('profile-view-indicator').style.display = 'none';
            baseConstraints = [where("cat", "==", filter)];
        }

        let sortField = "timestamp";
        if (filter === 'trending') {
            sortField = "likesCount";
        }

        let qConstraints = [...baseConstraints, orderBy(sortField, "desc"), orderBy(documentId()), limit(PAGE_SIZE)];
        if (append && pageState.lastDoc) {
            qConstraints = [...baseConstraints, orderBy(sortField, "desc"), orderBy(documentId()), startAfter(pageState.lastDoc), limit(PAGE_SIZE)];
        }

        let snapshot;
        try {
            snapshot = await getDocs(query(collection(db, "images"), ...qConstraints));
        } catch (error) {
            console.error(error);
            if (!append) gallery.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #ff4757; padding: 40px;">تعذر تحميل المعرض، تحقق من اتصالك بالإنترنت وحاول مجدداً.</div>`;
            else if (loadMoreStatus) loadMoreStatus.innerText = "تعذر تحميل المزيد، حاول مجدداً.";
            pageState.loading = false;
            if (loadMoreBtn) loadMoreBtn.disabled = false;
            return;
        }

        if (!append) gallery.innerHTML = "";

        let docsToRender = [];
        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            if (searchQuery) {
                const s = searchQuery.toLowerCase();
                const titleMatch = (data.cat || "").toLowerCase().includes(s);
                const userMatch = (data.userName || "").toLowerCase().includes(s);
                const tagMatch = data.tags && data.tags.some(t => t.toLowerCase().includes(s));
                if (titleMatch || userMatch || tagMatch) {
                    docsToRender.push({ id: docSnap.id, data });
                }
            } else {
                docsToRender.push({ id: docSnap.id, data });
            }
        });

        if (docsToRender.length === 0 && !append) {
            gallery.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #666; padding: 40px;">لا توجد صور مطابقة لفلتر البحث حالياً...</div>`;
            pageState.hasMore = false;
            if (loadMoreBtn) loadMoreBtn.style.display = 'none';
            pageState.loading = false;
            return;
        }

        pageState.hasMore = snapshot.docs.length === PAGE_SIZE;
        if (snapshot.docs.length > 0) pageState.lastDoc = snapshot.docs[snapshot.docs.length - 1];

        const imageIds = docsToRender.map(d => d.id);
        const allComments = [];
        const allReplies = [];
        
        if (imageIds.length > 0) {
            for (let i = 0; i < imageIds.length; i += 10) {
                const batchIds = imageIds.slice(i, i + 10);
                const cQ = query(collectionGroup(db, "comments"), where("imageId", "in", batchIds));
                const cSnap = await getDocs(cQ);
                cSnap.forEach(cs => allComments.push({ id: cs.id, ...cs.data() }));
            }
        }

        const commentIds = allComments.map(c => c.id);
        if (commentIds.length > 0) {
            for (let i = 0; i < commentIds.length; i += 10) {
                const batchIds = commentIds.slice(i, i + 10);
                const rQ = query(collectionGroup(db, "replies"), where("commentId", "in", batchIds));
                const rSnap = await getDocs(rQ);
                rSnap.forEach(rs => allReplies.push({ id: rs.id, ...rs.data() }));
            }
        }

        if (!append) galleryImages = {};

        docsToRender.forEach(({ id: imgId, data: item }) => {
            const userName = item.userName || "مستخدم مجهول";
            const category = item.cat || "إبداع";
            const userAvatar = item.userAvatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(userName);
            
            const likesArray = item.likes || [];
            const isLiked = likesArray.includes(myId);
            const likesCount = likesArray.length;

            const imgComments = allComments.filter(c => c.imageId === imgId);
            let commentsHtml = "";
            imgComments.forEach(c => {
                const isMyComment = c.userId === myId;
                const safeCommentText = escapeHtml(c.text);
                const safeCommentUser = escapeHtml(c.userName);
                const commentAvatar = c.userAvatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(safeCommentUser);
                
                const commentReplies = allReplies.filter(r => r.commentId === c.id);
                let repliesHtml = "";
                commentReplies.forEach(r => {
                    const safeReplyText = escapeHtml(r.text);
                    const safeReplyUser = escapeHtml(r.userName);
                    const replyAvatar = r.userAvatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(safeReplyUser);
                    
                    repliesHtml += `
                        <div class="reply-item">
                            <div style="display:flex; align-items:center; gap:6px;">
                                <img src="${escapeHtml(replyAvatar)}" class="avatar-img-small" alt="avatar">
                                <span><b>${safeReplyUser}:</b> ${safeReplyText}</span>
                            </div>
                            <button class="report-btn" data-targetid="${r.id}" data-type="reply" style="background:none; border:none; cursor:pointer;" title="إبلاغ">🚩</button>
                        </div>`;
                });

                commentsHtml += `
                    <div class="comment-item" id="comment-container-${c.id}">
                        <div class="comment-header">
                            <div class="comment-user-box">
                                <img src="${escapeHtml(commentAvatar)}" class="avatar-img-small" alt="avatar">
                                <span class="comment-user">${safeCommentUser}:</span>
                                <span id="text-${c.id}">${safeCommentText}</span>
                            </div>
                            <div style="display:flex; align-items:center; gap:5px;">
                                <button class="report-btn" data-targetid="${c.id}" data-type="comment" style="background:none; border:none; cursor:pointer;" title="إبلاغ">🚩</button>
                                ${isMyComment ? `
                                    <span class="comment-actions">
                                        <button class="edit-comment-btn" data-commentid="${c.id}" data-imageid="${imgId}" data-text="${escapeHtml(c.text)}" title="تعديل">✏️</button>
                                        <button class="delete-comment-btn" data-commentid="${c.id}" data-imageid="${imgId}" title="حذف">🗑️</button>
                                    </span>
                                ` : ''}
                            </div>
                        </div>
                        
                        <div class="replies-list" id="replies-list-${c.id}">${repliesHtml}</div>
                        <div class="reply-input-box" style="margin-right:20px; margin-top:5px;">
                            <input type="text" class="reply-input" id="reply-input-${c.id}" placeholder="اكتب رداً..." data-commentid="${c.id}" data-imageid="${imgId}" data-postownerid="${item.userId}" data-commentownerid="${c.userId}">
                            <button class="reply-btn" data-commentid="${c.id}" data-imageid="${imgId}" data-postownerid="${item.userId}" data-commentownerid="${c.userId}">رد</button>
                        </div>
                    </div>`;
            });

            const safeUserName = escapeHtml(userName);
            const safeCategory = escapeHtml(category);
            galleryImages[imgId] = item.src;

            let tagsHtml = "";
            if (item.tags && item.tags.length > 0) {
                item.tags.forEach(tag => {
                    tagsHtml += `<span class="tag-badge" data-tag="${escapeHtml(tag)}">#${escapeHtml(tag)}</span>`;
                });
            }

            gallery.innerHTML += `
                <div class="photo-card" id="card-${imgId}">
                    <div class="photo-header">
                        <img src="${escapeHtml(userAvatar)}" class="avatar-img" alt="avatar">
                        <h3 class="photo-title" style="margin:0;">${safeCategory} — بواسطة ${safeUserName}</h3>
                    </div>
                    <span class="user-tag" data-userid="${escapeHtml(item.userId)}">👤 ملف المصمم</span>
                    ${(myId && item.userId === myId) ? `<button class="del-btn" data-imgid="${escapeHtml(imgId)}">×</button>` : ''}
                    
                    <img class="photo-img" src="${escapeHtml(item.src)}" alt="${safeCategory} بواسطة ${safeUserName}" loading="lazy" data-imgid="${escapeHtml(imgId)}">
                    
                    <div class="tags-container">${tagsHtml}</div>

                    <div class="interaction-bar">
                        <button class="like-container" data-imgid="${imgId}" data-likes='${JSON.stringify(likesArray)}' data-ownerid="${item.userId}">
                            <span class="like-btn ${isLiked ? 'liked' : ''}" id="heart-${imgId}">${isLiked ? '❤️' : '🤍'}</span>
                            <span class="like-count" id="count-${imgId}">${likesCount} إعجاب</span>
                        </button>
                        
                        <div class="share-actions">
                            <button class="share-btn whatsapp" data-src="${escapeHtml(item.src)}" data-category="${safeCategory}" title="واتساب">💬</button>
                            <button class="share-btn facebook" data-src="${escapeHtml(item.src)}" title="فيسبوك">👥</button>
                            <button class="report-btn" data-targetid="${escapeHtml(imgId)}" data-type="image" style="background:none; border:none; cursor:pointer;" title="إبلاغ عن محتوى">🚩</button>
                            <a href="${escapeHtml(item.src)}" download style="text-decoration:none; font-size:14px; color:var(--accent);">📥 تحميل</a>
                        </div>
                    </div>
                    
                    <div class="comments-section">
                        <div class="comments-list" id="comments-list-${imgId}">
                            ${commentsHtml ? commentsHtml : `<span id="no-comment-msg-${imgId}" style="color:#666; font-size:11px;">لا توجد تعليقات بعد...</span>`}
                        </div>
                        <div class="comment-input-box">
                            <input type="text" id="input-${imgId}" class="comment-input" placeholder="اكتب تعليقاً..." data-imgid="${imgId}" data-ownerid="${item.userId}">
                            <button class="comment-btn" data-imgid="${imgId}" data-ownerid="${item.userId}">نشر</button>
                        </div>
                    </div>
                </div>
            `;
        });

        if (loadMoreBtn) {
            loadMoreBtn.style.display = pageState.hasMore ? 'inline-block' : 'none';
            loadMoreBtn.disabled = false;
        }
        if (loadMoreStatus) loadMoreStatus.innerText = "";
        pageState.loading = false;

        if (!append) {
            const currentHash = window.location.hash;
            if (currentHash && currentHash.startsWith('#photo-')) {
                const targetId = currentHash.replace('#photo-', '');
                if (galleryImages[targetId]) {
                    openLightboxImage(null, galleryImages[targetId], targetId, true);
                }
            }
        }
    };

    const toggleLike = async (event, imageId, likesArray, postOwnerId) => {
        if(event) event.preventDefault();
        if(!auth.currentUser) { alert("يجب تسجيل الدخول للتفاعل والإعجاب بالصور!"); return; }
        const myId = auth.currentUser.uid;
        const currentUserName = auth.currentUser.displayName || "مستخدم مجهول";
        const imageRef = doc(db, "images", imageId);
        
        let updatedLikes = [...likesArray];
        let hasLiked = updatedLikes.includes(myId);
        
        if (hasLiked) { updatedLikes = updatedLikes.filter(id => id !== myId); } 
        else { updatedLikes.push(myId); }
        
        const heartEl = document.getElementById(`heart-${imageId}`);
        const countEl = document.getElementById(`count-${imageId}`);
        const containerEl = event.currentTarget;
        
        if(heartEl && countEl) {
            heartEl.innerText = hasLiked ? '🤍' : '❤️';
            heartEl.classList.toggle('liked');
            countEl.innerText = `${updatedLikes.length} إعجاب`;
            containerEl.setAttribute("data-likes", JSON.stringify(updatedLikes));
        }

        try { 
            await updateDoc(imageRef, { likes: updatedLikes, likesCount: updatedLikes.length }); 
            if (!hasLiked && postOwnerId !== myId) {
                await addDoc(collection(db, "notifications"), {
                    toUserId: postOwnerId,
                    fromUserId: myId,
                    fromUserName: currentUserName,
                    type: "like",
                    imageId,
                    read: false,
                    timestamp: Date.now()
                });
            }
        } catch (error) { console.error(error); }
    };

    const addComment = async (event, imageId, postOwnerId) => {
        if(event) event.preventDefault();
        if(!auth.currentUser) { alert("يجب تسجيل الدخول لكتابة تعليق!"); return; }
        const input = document.getElementById(`input-${imageId}`);
        const text = input.value.trim(); if(!text) return;
        const currentUserId = auth.currentUser.uid;
        const currentUserName = auth.currentUser.displayName || "مستخدم مجهول";
        const currentUserAvatar = auth.currentUser.photoURL || "";
        
        input.value = ""; 

        try {
            // التعليقات تُخزَّن الآن كمجموعة فرعية تحت الصورة: images/{imageId}/comments/{commentId}
            const docRef = await addDoc(collection(db, "images", imageId, "comments"), { 
                imageId, 
                text, 
                userId: currentUserId, 
                userName: currentUserName, 
                userAvatar: currentUserAvatar, 
                timestamp: Date.now() 
            });
            
            const listEl = document.getElementById(`comments-list-${imageId}`);
            const noMsg = document.getElementById(`no-comment-msg-${imageId}`);
            if(noMsg) noMsg.remove();
            
            const newCommentHtml = `
                <div class="comment-item" id="comment-container-${docRef.id}">
                    <div class="comment-header">
                        <div class="comment-user-box">
                            <img src="${escapeHtml(currentUserAvatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(currentUserName))}" class="avatar-img-small" alt="avatar">
                            <span class="comment-user">${escapeHtml(currentUserName)}:</span>
                            <span id="text-${docRef.id}">${escapeHtml(text)}</span>
                        </div>
                        <div style="display:flex; align-items:center; gap:5px;">
                            <button class="report-btn" data-targetid="${docRef.id}" data-type="comment" style="background:none; border:none; cursor:pointer;" title="إبلاغ">🚩</button>
                            <span class="comment-actions">
                                <button class="edit-comment-btn" data-commentid="${docRef.id}" data-imageid="${imageId}" data-text="${escapeHtml(text)}" title="تعديل">✏️</button>
                                <button class="delete-comment-btn" data-commentid="${docRef.id}" data-imageid="${imageId}" title="حذف">🗑️</button>
                            </span>
                        </div>
                    </div>
                    <div class="replies-list" id="replies-list-${docRef.id}"></div>
                    <div class="reply-input-box" style="margin-right:20px; margin-top:5px;">
                        <input type="text" class="reply-input" id="reply-input-${docRef.id}" placeholder="اكتب رداً..." data-commentid="${docRef.id}" data-imageid="${imageId}" data-postownerid="${postOwnerId}" data-commentownerid="${currentUserId}">
                        <button class="reply-btn" data-commentid="${docRef.id}" data-imageid="${imageId}" data-postownerid="${postOwnerId}" data-commentownerid="${currentUserId}">رد</button>
                    </div>
                </div>`;
            listEl.insertAdjacentHTML('beforeend', newCommentHtml);

            if (postOwnerId !== currentUserId) {
                await addDoc(collection(db, "notifications"), { 
                    toUserId: postOwnerId, 
                    fromUserId: currentUserId, 
                    fromUserName: currentUserName, 
                    type: "comment", 
                    commentText: text, 
                    imageId, 
                    read: false,
                    timestamp: Date.now() 
                });
            }
        } catch (error) { console.error(error); }
    };

    const addReply = async (event, commentId, imageId, postOwnerId, commentOwnerId) => {
        if(event) event.preventDefault();
        if(!auth.currentUser) { alert("يجب تسجيل الدخول لإرسال رد!"); return; }
        const input = document.getElementById(`reply-input-${commentId}`);
        const text = input.value.trim(); if(!text) return;
        const currentUserId = auth.currentUser.uid;
        const currentUserName = auth.currentUser.displayName || "مستخدم مجهول";
        const currentUserAvatar = auth.currentUser.photoURL || "";
        
        input.value = "";

        try {
            // الردود تُخزَّن كمجموعة فرعية تحت التعليق: images/{imageId}/comments/{commentId}/replies/{replyId}
            const replyRef = await addDoc(collection(db, "images", imageId, "comments", commentId, "replies"), {
                commentId,
                imageId,
                text,
                userId: currentUserId,
                userName: currentUserName,
                userAvatar: currentUserAvatar,
                timestamp: Date.now()
            });

            const repliesContainer = document.getElementById(`replies-list-${commentId}`);
            const newReplyHtml = `
                <div class="reply-item">
                    <div style="display:flex; align-items:center; gap:6px;">
                        <img src="${escapeHtml(currentUserAvatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(currentUserName))}" class="avatar-img-small" alt="avatar">
                        <span><b>${escapeHtml(currentUserName)}:</b> ${escapeHtml(text)}</span>
                    </div>
                    <button class="report-btn" data-targetid="${replyRef.id}" data-type="reply" style="background:none; border:none; cursor:pointer;" title="إبلاغ">🚩</button>
                </div>`;
            repliesContainer.insertAdjacentHTML('beforeend', newReplyHtml);

            if (commentOwnerId !== currentUserId) {
                await addDoc(collection(db, "notifications"), {
                    toUserId: commentOwnerId,
                    fromUserId: currentUserId,
                    fromUserName: currentUserName,
                    type: "reply",
                    commentText: text,
                    imageId,
                    read: false,
                    timestamp: Date.now()
                });
            }
        } catch (error) { console.error(error); }
    };

    const editComment = async (event, commentId, imageId, oldText) => {
        if(event) event.preventDefault();
        const newText = prompt("تعديل التعليق:", oldText);
        if(!newText || newText.trim() === oldText) return;
        
        const textEl = document.getElementById('text-' + commentId);
        if(textEl) textEl.innerText = newText.trim();

        try { await updateDoc(doc(db, "images", imageId, "comments", commentId), { text: newText.trim() }); } catch (error) { alert("فشل تعديل التعليق"); }
    };

    const deleteComment = async (event, commentId, imageId) => {
        if(event) event.preventDefault();
        if(confirm("هل تريد حذف هذا التعليق؟")) {
            const commentBox = document.getElementById(`comment-container-${commentId}`);
            if(commentBox) commentBox.remove();
            try {
                // حذف الردود المرتبطة بالتعليق أولاً (مجموعة فرعية) ثم حذف التعليق نفسه
                const repliesSnap = await getDocs(collection(db, "images", imageId, "comments", commentId, "replies"));
                for (const r of repliesSnap.docs) {
                    await deleteDoc(r.ref);
                }
                await deleteDoc(doc(db, "images", imageId, "comments", commentId));
            } catch (error) { alert("فشل حذف التعليق"); }
        }
    };

    const deleteImage = async (event, id) => {
        if(event) event.preventDefault();
        if(confirm("هل تريد حذف هذه الصورة نهائياً؟")) { 
            const card = document.getElementById(`card-${id}`);
            if(card) card.remove();
            try {
                // حذف كل التعليقات والردود المرتبطة بالصورة (مجموعات فرعية) قبل حذف الصورة نفسها
                const commentsSnap = await getDocs(collection(db, "images", id, "comments"));
                for (const c of commentsSnap.docs) {
                    const repliesSnap = await getDocs(collection(db, "images", id, "comments", c.id, "replies"));
                    for (const r of repliesSnap.docs) {
                        await deleteDoc(r.ref);
                    }
                    await deleteDoc(c.ref);
                }
                await deleteDoc(doc(db, "images", id));
            } catch (error) { alert("فشل حذف الصورة"); }
        }
    };

    const reportContent = async (imageId, reason = "غير لائق") => {
        // يجب تسجيل الدخول لتقديم بلاغ عن صورة
        if (!auth.currentUser) {
            alert("يجب تسجيل الدخول لتقديم بلاغ.");
            return;
        }
        const reporterId = auth.currentUser.uid;
        try {
            // منع نفس المستخدم من إرسال أكثر من بلاغ واحد على نفس الصورة
            const existingQ = query(
                collection(db, "reports"),
                where("reportedImageId", "==", imageId),
                where("reporterId", "==", reporterId)
            );
            const existingSnap = await getDocs(existingQ);
            if (!existingSnap.empty) {
                alert("لقد قمت بالإبلاغ عن هذه الصورة من قبل.");
                return;
            }

            await addDoc(collection(db, "reports"), {
                reportedImageId: imageId,
                targetId: imageId,
                targetType: "image",
                reason: reason,
                reporterId: reporterId,
                reporterName: auth.currentUser.displayName || "عضو",
                timestamp: Date.now()
            });
            alert("تم إرسال بلاغك للمراجعة، شكراً لمساهمتك.");
        } catch (e) {
            console.error("خطأ في إرسال البلاغ:", e);
            alert("حدث خطأ أثناء إرسال الإبلاغ.");
        }
    };

    const submitReport = async (targetId, type) => {
        if(!auth.currentUser) { alert("يجب تسجيل الدخول لتقديم بلاغ."); return; }
        const reason = prompt("يرجى توضيح سبب الإبلاغ عن هذا المحتوى:");
        if (!reason || !reason.trim()) return;

        const reporterId = auth.currentUser.uid;
        try {
            // منع تكرار البلاغ من نفس المستخدم على نفس العنصر
            const existingQ = query(
                collection(db, "reports"),
                where("targetId", "==", targetId),
                where("reporterId", "==", reporterId)
            );
            const existingSnap = await getDocs(existingQ);
            if (!existingSnap.empty) {
                alert("لقد قمت بالإبلاغ عن هذا المحتوى من قبل.");
                return;
            }

            await addDoc(collection(db, "reports"), {
                targetId,
                targetType: type,
                reason: reason.trim(),
                reporterId,
                reporterName: auth.currentUser.displayName || "عضو",
                timestamp: Date.now()
            });
            alert("تم إرسال الإبلاغ بنجاح وسيتم مراجعته فوراً.");
        } catch (error) {
            alert("حدث خطأ أثناء إرسال الإبلاغ.");
        }
    };

    const autoModerate = async () => {
        if (!auth.currentUser || auth.currentUser.uid !== ADMIN_UID) {
            alert("غير مسموح لك بإجراء هذه العملية.");
            return;
        }
        try {
            // ملاحظة أداء: يتم تحديد حد أقصى للقراءة لتفادي قراءة غير محدودة لمجموعة البلاغات
            const reportsSnap = await getDocs(query(collection(db, "reports"), limit(1000)));
            const imageReportsCount = {};
            
            reportsSnap.forEach(docSnap => {
                const data = docSnap.data();
                const imgId = data.reportedImageId;
                if (imgId) {
                    imageReportsCount[imgId] = (imageReportsCount[imgId] || 0) + 1;
                }
            });

            let deletedCount = 0;
            for (const [imgId, count] of Object.entries(imageReportsCount)) {
                if (count >= 5) {
                    // حذف التعليقات والردود المرتبطة (مجموعات فرعية) قبل حذف الصورة
                    const commentsSnap = await getDocs(collection(db, "images", imgId, "comments"));
                    for (const c of commentsSnap.docs) {
                        const repliesSnap = await getDocs(collection(db, "images", imgId, "comments", c.id, "replies"));
                        for (const r of repliesSnap.docs) {
                            await deleteDoc(r.ref);
                        }
                        await deleteDoc(c.ref);
                    }
                    await deleteDoc(doc(db, "images", imgId));
                    
                    const assocReports = reportsSnap.docs.filter(d => d.data().reportedImageId === imgId);
                    for (const repDoc of assocReports) {
                        await deleteDoc(doc(db, "reports", repDoc.id));
                    }
                    deletedCount++;
                }
            }
            alert(`اكتمل الإشراف التلقائي. تم بنجاح حذف ${deletedCount} من المنشورات المخالفة وتصفية بلاغاتها.`);
            render();
        } catch (error) {
            console.error("خطأ أثناء تشغيل المشرف الآلي:", error);
            alert("حدث خطأ غير متوقع أثناء الفحص التلقائي.");
        }
    };

    const compressImage = (file) => {
        return new Promise((resolve, reject) => {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image(); img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > 1200) { height *= 1200 / width; width = 1200; } } 
                    else { if (height > 1200) { width *= 1200 / height; height = 1200; } }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);

                    const mimeType = supportsWebP ? 'image/webp' : 'image/jpeg';
                    const quality = supportsWebP ? 0.82 : 0.75;
                    canvas.toBlob((blob) => {
                        if (!blob) { reject(new Error('compression-failed')); return; }
                        resolve({ blob, mimeType });
                    }, mimeType, quality);
                };
                img.onerror = () => reject(new Error('invalid-image'));
            };
            reader.onerror = error => reject(error);
        });
    };

    // مستمعات الأحداث
    document.getElementById('gallery').addEventListener('click', (e) => {
        const target = e.target;
        
        const userTag = target.closest('.user-tag');
        if (userTag) {
            viewUserProfile(userTag.dataset.userid);
            return;
        }

        const delBtn = target.closest('.del-btn');
        if (delBtn) {
            deleteImage(e, delBtn.dataset.imgid);
            return;
        }

        const photoImg = target.closest('.photo-img');
        if (photoImg) {
            openLightboxImage(e, photoImg.src, photoImg.dataset.imgid);
            return;
        }

        const likeBtn = target.closest('.like-container');
        if (likeBtn) {
            const imgId = likeBtn.dataset.imgid;
            const likesArray = JSON.parse(likeBtn.getAttribute('data-likes') || '[]');
            toggleLike(e, imgId, likesArray, likeBtn.dataset.ownerid);
            return;
        }

        const commentBtn = target.closest('.comment-btn');
        if (commentBtn) {
            addComment(e, commentBtn.dataset.imgid, commentBtn.dataset.ownerid);
            return;
        }

        const editBtn = target.closest('.edit-comment-btn');
        if (editBtn) {
            editComment(e, editBtn.dataset.commentid, editBtn.dataset.imageid, editBtn.dataset.text);
            return;
        }

        const deleteBtn = target.closest('.delete-comment-btn');
        if (deleteBtn) {
            deleteComment(e, deleteBtn.dataset.commentid, deleteBtn.dataset.imageid);
            return;
        }

        const replyBtn = target.closest('.reply-btn');
        if (replyBtn) {
            addReply(e, replyBtn.dataset.commentid, replyBtn.dataset.imageid, replyBtn.dataset.postownerid, replyBtn.dataset.commentownerid);
            return;
        }

        const reportBtn = target.closest('.report-btn');
        if (reportBtn) {
            if (reportBtn.dataset.type === 'image') {
                const reason = prompt("يرجى كتابة سبب الإبلاغ عن هذه الصورة:") || "غير لائق";
                reportContent(reportBtn.dataset.targetid, reason);
            } else {
                submitReport(reportBtn.dataset.targetid, reportBtn.dataset.type);
            }
            return;
        }

        const tagBadge = target.closest('.tag-badge');
        if (tagBadge) {
            document.getElementById('search-input').value = tagBadge.dataset.tag;
            render('الكل');
            return;
        }

        const shareWA = target.closest('.share-btn.whatsapp');
        if (shareWA) {
            const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(shareWA.dataset.category + ": " + shareWA.dataset.src)}`;
            window.open(url, '_blank', 'noopener,noreferrer');
            return;
        }

        const shareFB = target.closest('.share-btn.facebook');
        if (shareFB) {
            const url = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareFB.dataset.src)}`;
            window.open(url, '_blank', 'noopener,noreferrer');
            return;
        }
    });

    document.getElementById('gallery').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (e.target.classList.contains('comment-input')) {
                addComment(e, e.target.dataset.imgid, e.target.dataset.ownerid);
            } else if (e.target.classList.contains('reply-input')) {
                addReply(e, e.target.dataset.commentid, e.target.dataset.imageid, e.target.dataset.postownerid, e.target.dataset.commentownerid);
            }
        }
    });

    const dragDropZone = document.getElementById('upload-section-box');
    const uploadInput = document.getElementById('upload');

    document.getElementById('select-file-btn').addEventListener('click', () => uploadInput.click());

    ['dragenter', 'dragover'].forEach(name => {
        dragDropZone.addEventListener(name, (e) => {
            e.preventDefault();
            dragDropZone.classList.add('highlight');
        });
    });

    ['dragleave', 'drop'].forEach(name => {
        dragDropZone.addEventListener(name, (e) => {
            e.preventDefault();
            dragDropZone.classList.remove('highlight');
        });
    });

    dragDropZone.addEventListener('drop', (e) => {
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            uploadInput.files = files;
            uploadInput.dispatchEvent(new Event('change'));
        }
    });

    document.getElementById('theme-toggle-btn').addEventListener('click', () => {
        document.body.classList.toggle('light-mode');
        localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    });

    document.getElementById('noti-wrapper-area').addEventListener('click', (e) => {
        e.stopPropagation();
        const d = document.getElementById('noti-dropdown');
        const willOpen = d.style.display !== 'block';
        d.style.display = willOpen ? 'block' : 'none';
        if (willOpen) markNotificationsRead();
    });

    window.addEventListener('click', () => {
        document.getElementById('noti-dropdown').style.display = 'none';
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
        signOut(auth).then(() => { location.reload(); });
    });

    document.getElementById('login-nav-btn').addEventListener('click', () => {
        document.getElementById('login-screen').style.display = 'block';
    });

    document.getElementById('close-login-screen').addEventListener('click', () => {
        document.getElementById('login-screen').style.display = 'none';
    });

    document.getElementById('login-bar-btn').addEventListener('click', () => {
        document.getElementById('login-screen').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    document.getElementById('google-login').addEventListener('click', async () => {
        try { 
            await signInWithPopup(auth, provider); 
            document.getElementById('login-screen').style.display = 'none';
        } catch (error) { alert("فشل تسجيل الدخول"); }
    });

    document.getElementById('clear-profile-filter-btn').addEventListener('click', () => {
        document.getElementById('profile-view-indicator').style.display = 'none';
        render('الكل', document.getElementById('btn-all'));
    });

    document.getElementById('load-more-btn').addEventListener('click', loadMoreImages);

    document.querySelectorAll('.filter-btn').forEach(btn => {
        if(btn.id !== 'search-btn' && btn.id !== 'select-file-btn') {
            btn.addEventListener('click', () => {
                render(btn.dataset.category, btn);
            });
        }
    });

    document.getElementById('search-btn').addEventListener('click', () => render('الكل'));
    document.getElementById('search-input').addEventListener('keydown', (e) => { if(e.key === 'Enter') render('الكل'); });

    document.getElementById('customLightbox').addEventListener('click', closeLightboxImage);
    document.getElementById('closeLightboxBtn').addEventListener('click', closeLightboxImage);

    document.getElementById('auto-moderate-btn').addEventListener('click', autoModerate);

    if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');

    onAuthStateChanged(auth, async (user) => {
        const loginBar = document.getElementById('login-bar');
        const loginNavBtn = document.getElementById('login-nav-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const btnMyPosts = document.getElementById('btn-my-posts');
        const uploadSectionBox = document.getElementById('upload-section-box');
        const notiWrapperArea = document.getElementById('noti-wrapper-area');
        const welcomeMsg = document.getElementById('welcome-msg');
        const headerAvatar = document.getElementById('header-avatar');
        const adminPanel = document.getElementById('admin-panel');

        if(user) {
            const bannedSnap = await getDoc(doc(db, "bannedUsers", user.uid));
            if (bannedSnap.exists()) {
                alert("عذراً، تم حظر حسابك من المنصة.");
                await signOut(auth); 
                window.location.reload();
                return;
            }

            loginBar.style.display = 'none';
            loginNavBtn.style.display = 'none';
            logoutBtn.style.display = 'block';
            btnMyPosts.style.display = 'inline-block';
            uploadSectionBox.style.display = 'block';
            notiWrapperArea.style.display = 'block';
            welcomeMsg.innerText = "مرحباً بك، " + (user.displayName || "مستخدم");
            if (user.photoURL) {
                headerAvatar.src = user.photoURL;
                headerAvatar.style.display = 'block';
            }

            if (user.uid === ADMIN_UID) {
                adminPanel.style.display = 'block';
            } else {
                adminPanel.style.display = 'none';
            }

            await syncUserProfile(user);
            listenToNotifications(user.uid);
        } else {
            if (unsubscribeNoti) {
                unsubscribeNoti();
                unsubscribeNoti = null;
            }
            loginBar.style.display = 'block';
            loginNavBtn.style.display = 'block';
            logoutBtn.style.display = 'none';
            btnMyPosts.style.display = 'none';
            uploadSectionBox.style.display = 'none';
            notiWrapperArea.style.display = 'none';
            adminPanel.style.display = 'none'; 
            welcomeMsg.innerText = "زائر المنصة";
            headerAvatar.style.display = 'none';

            const badge = document.getElementById('noti-count');
            const list = document.getElementById('noti-list');
            if (badge) badge.style.display = 'none';
            if (list) list.innerHTML = `<div style="padding:15px; text-align:center; color:#666; font-size:12px;">لا توجد إشعارات بعد...</div>`;
        }
        render(); 
    });

    // معالجة الرفع
    uploadInput.addEventListener('change', async function(e) {
        const file = uploadInput.files[0]; if(!file) return;
        const statusText = document.getElementById('upload-status');
        const spinner = document.getElementById('uploadSpinner');

        if (!auth.currentUser) { statusText.innerText = "يجب تسجيل الدخول أولاً للرفع."; uploadInput.value = ""; return; }

        if (!file.type.startsWith("image/")) { statusText.innerText = "الملف المختار ليس صورة."; uploadInput.value = ""; return; }
        const maxSizeMB = 15;
        if (file.size > maxSizeMB * 1024 * 1024) { statusText.innerText = `حجم الصورة أكبر من ${maxSizeMB}MB`; uploadInput.value = ""; return; }

        statusText.innerText = "جاري ضغط الصورة...";
        spinner.style.display = "block";
        uploadInput.disabled = true;

        try {
            const compressed = await compressImage(file);
            statusText.innerText = "جاري رفع الصورة...";
            const ext = compressed.mimeType === 'image/webp' ? 'webp' : 'jpg';
            const formData = new FormData(); 
            formData.append("image", compressed.blob, `image.${ext}`);

            let imageUrl = "";
            
            try {
                const userToken = await auth.currentUser.getIdToken();
                const backendResponse = await fetchWithRetry("/api/upload", { 
                    method: "POST", 
                    body: formData,
                    headers: { "Authorization": `Bearer ${userToken}` }
                });
                if (backendResponse.ok) {
                    const data = await backendResponse.json();
                    imageUrl = data.url;
                }
            } catch (err) {
                console.warn("استخدام الرفع الاحتياطي المباشر...");
            }

            if (!imageUrl) {
                try {
                    const response = await fetchWithRetry(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { 
                        method: "POST", 
                        body: formData 
                    });
                    const result = await response.json();
                    if (result.success) {
                        imageUrl = result.data.url;
                    }
                } catch (imgbbErr) {
                    console.error("فشل الرفع الاحتياطي المباشر للشبكة:", imgbbErr);
                }
            }

            if (imageUrl) {
                const tagInputValue = document.getElementById('tagInput').value.trim();
                const parsedTags = tagInputValue ? tagInputValue.split(/[،,]+/).map(t => t.trim()).filter(Boolean) : [];
                
                await addDoc(collection(db, "images"), { 
                    src: imageUrl, 
                    cat: document.getElementById('catSelect').value, 
                    userId: auth.currentUser.uid, 
                    userName: auth.currentUser.displayName,
                    userAvatar: auth.currentUser.photoURL || "",
                    likes: [],
                    likesCount: 0,
                    tags: parsedTags,
                    timestamp: Date.now()
                });
                statusText.innerText = "تم الرفع بنجاح! 🎉";
                document.getElementById('tagInput').value = "";
                setTimeout(() => statusText.innerText = "", 3000);
                render();
            } else {
                statusText.innerText = "تعذر رفع الصورة بعد عدة محاولات.";
            }
        } catch (error) {
            console.error(error);
            statusText.innerText = "حدث خطأ غير متوقع أثناء الرفع.";
        } finally {
            spinner.style.display = "none";
            uploadInput.disabled = false;
            uploadInput.value = "";
        }
    });

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('تم تسجيل Service Worker بنجاح!', reg.scope))
                .catch(err => console.log('فشل تسجيل Service Worker:', err));
        });
    }
</script>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصتي الإبداعية العالمية</title>
    
    <!-- الكلمات المفتاحية والوصف الوصفي لجوجل (SEO) -->
    <meta name="description" content="منصتي الإبداعية العالمية - منصة اجتماعية مبتكرة لعرض ومشاركة أعمال الأنمي، الشعارات، والمناظر الطبيعية. شارك إبداعك وتفاعل مع المبدعين.">
    <meta name="keywords" content="منصة إبداعية, معرض أعمال, صور أنمي, تصميم شعارات, مناظر طبيعية, مشاركة الصور, معرض إبداعي">
    
    <!-- كود إثبات ملكية جوجل (Google Verification Meta Tag) -->
    <meta name="google-site-verification" content="google2c40469fe65033ae" />

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght=400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00adb5; --bg: #0f0f0f; --text: #ffffff; --card-bg: #1a1a1a; --border: #333; --header-bg: #111; }
        .light-mode { --bg: #f5f6fa; --text: #2f3640; --card-bg: #ffffff; --border: #dcdde1; --header-bg: #ffffff; }
        
        body { background-color: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; padding: 20px; transition: background 0.3s, color 0.3s; }
        
        #login-screen { text-align: center; padding-top: 20vh; display: none; }
        #main-gallery { display: block; animation: fadeIn 0.8s; } /* جعل المعرض ظاهراً افتراضياً للأرشفة */

        .google-btn { 
            background: #111111; border: 1px solid #333; color: white; padding: 14px 35px; cursor: pointer; 
            border-radius: 30px; font-family: 'Cairo', sans-serif; font-size: 16px; display: inline-flex; align-items: center; gap: 15px; transition: 0.3s;
        }
        .google-btn:hover { background: #1a1a1a; border-color: var(--accent); box-shadow: 0 0 15px rgba(0,173,181,0.2); }

        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: var(--header-bg); border-radius: 15px; margin-bottom: 25px; border: 1px solid var(--border); }
        .header-actions { display: flex; align-items: center; gap: 20px; }
        
        .theme-btn { background: none; border: 1px solid var(--border); color: var(--text); padding: 5px 12px; border-radius: 20px; cursor: pointer; font-family: 'Cairo'; font-size: 13px; }

        .noti-wrapper { position: relative; cursor: pointer; font-size: 20px; }
        .noti-badge { position: absolute; top: -5px; right: -10px; background: #ff4757; color: white; font-size: 11px; padding: 2px 6px; border-radius: 50%; font-weight: bold; }
        .noti-dropdown { display: none; position: absolute; top: 30px; left: 0; background: var(--card-bg); border: 1px solid var(--border); min-width: 250px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 100; max-height: 200px; overflow-y: auto; }
        .noti-item { padding: 10px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text); }
        .noti-item:hover { background: rgba(0,173,181,0.1); }

        .controls { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        .filter-btn { background: var(--card-bg); border: 1px solid var(--border); color: var(--text); padding: 10px 25px; cursor: pointer; border-radius: 25px; transition: 0.3s; font-family: 'Cairo', sans-serif; }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; box-shadow: 0 0 15px rgba(0,173,181,0.4); }
        .filter-btn.profile-btn { border-color: #ffb703; color: #ffb703; }
        .filter-btn.profile-btn.active { background: #ffb703; color: #000; box-shadow: 0 0 15px rgba(255,183,3,0.4); }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; padding: 20px; }
        .photo-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; position: relative; display: flex; flex-direction: column; }
        .photo-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        
        .photo-img { width: 100%; height: 230px; object-fit: cover; cursor: pointer; transition: 0.2s; }
        .photo-img:hover { filter: brightness(0.85); }
        
        .user-tag { background: rgba(0, 0, 0, 0.7); color: #fff; padding: 5px 10px; font-size: 12px; border-radius: 20px; position: absolute; top: 10px; left: 10px; border: 1px solid #444; cursor: pointer; z-index: 10; }
        .user-tag:hover { background: var(--accent); color: white; }
        
        .del-btn { position: absolute; top: 10px; right: 10px; background: #ff4757; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; display: none; z-index: 10; }
        .photo-card:hover .del-btn { display: block; }

        .interaction-bar { padding: 10px 15px; text-align: center; display: flex; justify-content: center; align-items: center; gap: 25px; border-top: 1px solid var(--border); }
        .like-container { display: flex; align-items: center; gap: 5px; cursor: pointer; background: none; border: none; color: var(--text); font-family: 'Cairo'; font-size: 14px; }
        .like-btn { background: none; border: none; cursor: pointer; font-size: 18px; padding: 0; color: var(--text); pointer-events: none; }
        .like-btn.liked { color: #ff4757; transform: scale(1.2); }
        .like-count { font-size: 13px; }

        .comments-section { padding: 15px; background: var(--bg); border-top: 1px solid var(--border); flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .comments-list { max-height: 140px; overflow-y: auto; font-size: 13px; margin-bottom: 10px; padding-left: 5px; }
        .comment-item { margin-bottom: 8px; border-bottom: 1px dashed var(--border); padding-bottom: 6px; text-align: right; display: flex; justify-content: space-between; align-items: center; }
        .comment-user { color: var(--accent); font-weight: bold; }
        .comment-actions button { background: none; border: none; cursor: pointer; font-size: 12px; margin-right: 5px; padding: 0; }
        
        .comment-input-box { display: flex; gap: 5px; }
        .comment-input-box input { flex-grow: 1; background: var(--card-bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 20px; font-family: 'Cairo', sans-serif; font-size: 12px; }
        .comment-btn { background: var(--accent); border: none; color: white; padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; font-family: 'Cairo', sans-serif; }

        .lightbox-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 9999; justify-content: center; align-items: center; cursor: pointer; }
        .lightbox-overlay img { max-width: 90%; max-height: 90%; border-radius: 8px; box-shadow: 0 0 25px rgba(255,255,255,0.1); cursor: default; }
        .close-box { position: absolute; top: 25px; right: 35px; color: #fff; font-size: 40px; font-weight: bold; cursor: pointer; }

        .spinner { display: none; border: 4px solid rgba(255,255,255,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: var(--accent); animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="lightbox-overlay" id="customLightbox" onclick="window.closeLightboxImage(event)">
    <span class="close-box">&times;</span>
    <img id="customLightboxImg" src="" onclick="event.stopPropagation();">
</div>

<!-- شريط الدخول السريع في الأعلى إذا كان الزائر مجهولاً -->
<div id="login-bar" style="display:none; background:#ffb703; color:#000; text-align:center; padding:10px; font-weight:bold; font-size:14px;">
    أنت تتصفح كمشاهد حالياً. 
    <button onclick="document.getElementById('login-screen').style.display='block'; window.scrollTo(0,0);" style="background:#000; color:#fff; border:none; padding:3px 12px; margin-right:10px; border-radius:15px; cursor:pointer; font-family:'Cairo'; font-size:12px;">تسجيل الدخول للتفاعل والرفع</button>
</div>

<div id="login-screen">
    <div style="background:var(--card-bg); border:1px solid var(--border); padding:30px; display:inline-block; border-radius:15px; position:relative;">
        <button onclick="document.getElementById('login-screen').style.display='none';" style="position:absolute; top:10px; left:15px; background:none; border:none; color:var(--text); font-size:20px; cursor:pointer;">×</button>
        <h2 style="margin-bottom: 25px;">أهلاً بك في منصتك الإبداعية الاجتماعية</h2>
        <button class="google-btn" id="google-login">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" style="width:22px; height:22px;">
            متابعة باستخدام جوجل
        </button>
    </div>
</div>

<div id="main-gallery">
    <div class="header-bar">
        <h2 id="welcome-msg" style="margin: 0; font-size: 17px;">زائر المنصة</h2>
        <div class="header-actions">
            <button class="theme-btn" onclick="window.toggleTheme()">🌓 تبديل المظهر</button>
            
            <div class="noti-wrapper" id="noti-wrapper-area" onclick="window.toggleNotifications(event)" style="display:none;">
                🔔 <span class="noti-badge" id="noti-count" style="display:none;">0</span>
                <div class="noti-dropdown" id="noti-dropdown">
                    <div style="padding:10px; font-weight:bold; border-bottom:1px solid var(--border); font-size:13px; color:var(--accent);">الإشعارات الأخيرة</div>
                    <div id="noti-list"></div>
                </div>
            </div>
            <button id="logout-btn" onclick="window.logout()" style="display:none; background:transparent; border:1px solid #ff4757; color:#ff4757; padding:5px 15px; border-radius:5px; cursor:pointer; font-family: 'Cairo', sans-serif;">خروج</button>
            <button id="login-nav-btn" onclick="document.getElementById('login-screen').style.display='block'" style="background:var(--accent); border:none; color:white; padding:5px 15px; border-radius:5px; cursor:pointer; font-family: 'Cairo', sans-serif;">دخول</button>
        </div>
    </div>
    
    <div class="controls">
        <button class="filter-btn active" id="btn-all" onclick="window.render('الكل', this)">الكل</button>
        <button class="filter-btn" onclick="window.render('أنمي', this)">أنمي</button>
        <button class="filter-btn" onclick="window.render('مناظر', this)">مناظر</button>
        <button class="filter-btn" onclick="window.render('شعارات', this)">شعارات</button>
        <button class="filter-btn profile-btn" id="btn-my-posts" onclick="window.render('منشوراتي', this)" style="display:none;">👤 منشوراتي</button>
    </div>

    <div id="profile-view-indicator" style="display:none; text-align:center; margin-bottom:15px; color:#ffb703; font-weight:bold;">
        <span id="profile-user-name"></span> 
        <button onclick="window.clearProfileFilter()" style="background:none; border:1px solid #ffb703; color:#ffb703; padding:2px 10px; margin-right:10px; border-radius:15px; cursor:pointer; font-family:'Cairo'; font-size:12px;">العودة للمعرض العام ×</button>
    </div>

    <div id="upload-section-box" style="display: none; text-align: center; margin-bottom: 30px; border: 2px dashed var(--border); padding: 20px; border-radius: 15px;">
        <select id="catSelect" style="padding: 10px; border-radius: 5px; margin-left: 10px; background:var(--card-bg); color:var(--text); border:1px solid var(--border); font-family:'Cairo';">
            <option value="أنمي">أنمي</option>
            <option value="مناظر">مناظر</option>
            <option value="شعارات">شعارات</option>
        </select>
        <input type="file" id="upload" accept="image/*">
        <div class="spinner" id="uploadSpinner"></div>
        <p id="upload-status" style="margin-top: 10px; color: var(--accent); font-weight: bold;"></p>
    </div>

    <div class="gallery-grid" id="gallery"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAE6bFNg2UoTuX_3fpg-6qGIYptrPjomvI",
        authDomain: "my-creative-gallery.firebaseapp.com",
        projectId: "my-creative-gallery",
        messagingSenderId: "747786841776",
        appId: "1:747786841776:web:1c24ebf88b404a85b59575",
        measurementId: "G-2CM6BJJ53K"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    window.openLightboxImage = (event, src) => {
        if(event) event.preventDefault();
        document.getElementById('customLightboxImg').src = src;
        document.getElementById('customLightbox').style.display = 'flex';
    };

    window.closeLightboxImage = (event) => {
        if(event) event.preventDefault();
        document.getElementById('customLightbox').style.display = 'none';
    };

    window.toggleTheme = () => {
        document.body.classList.toggle('light-mode');
        localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    };
    if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');

    document.getElementById('google-login').onclick = async () => {
        try { 
            await signInWithPopup(auth, provider); 
            document.getElementById('login-screen').style.display = 'none';
        } catch (error) { alert("فشل تسجيل الدخول"); }
    };

    window.logout = () => { signOut(auth).then(() => { location.reload(); }); };
    window.onclick = () => { document.getElementById('noti-dropdown').style.display = 'none'; };
    window.toggleNotifications = (e) => { e.stopPropagation(); const d = document.getElementById('noti-dropdown'); d.style.display = d.style.display === 'block' ? 'none' : 'block'; };

    // تعديل الـ Auth الأساسي ليقوم بالريندر في كل الأحوال (مهم جداً للـ SEO)
    onAuthStateChanged(auth, (user) => {
        if(user) {
            document.getElementById('login-bar').style.display = 'none';
            document.getElementById('login-nav-btn').style.display = 'none';
            document.getElementById('logout-btn').style.display = 'block';
            document.getElementById('btn-my-posts').style.display = 'inline-block';
            document.getElementById('upload-section-box').style.display = 'block';
            document.getElementById('noti-wrapper-area').style.display = 'block';
            document.getElementById('welcome-msg').innerText = "مرحباً بك، " + user.displayName;
            listenToNotifications(user.uid);
        } else {
            document.getElementById('login-bar').style.display = 'block';
            document.getElementById('login-nav-btn').style.display = 'block';
            document.getElementById('logout-btn').style.display = 'none';
            document.getElementById('btn-my-posts').style.display = 'none';
            document.getElementById('upload-section-box').style.display = 'none';
            document.getElementById('noti-wrapper-area').style.display = 'none';
            document.getElementById('welcome-msg').innerText = "زائر المنصة";
        }
        window.render(); // استدعاء الريندر للكل (مسجل أو زائر عادي)
    });

    function listenToNotifications(currentUserId) {
        const qNoti = query(collection(db, "notifications"), where("toUserId", "==", currentUserId));
        onSnapshot(qNoti, (snapshot) => {
            const badge = document.getElementById('noti-count');
            const list = document.getElementById('noti-list');
            if(snapshot.empty) {
                badge.style.display = 'none';
                list.innerHTML = `<div style="padding:15px; text-align:center; color:#666; font-size:12px;">لا توجد إشعارات بعد...</div>`;
                return;
            }
            badge.innerText = snapshot.size; badge.style.display = 'block'; list.innerHTML = "";
            snapshot.forEach(docSnap => {
                const noti = docSnap.data();
                list.innerHTML += `<div class="noti-item">💬 <b>${noti.fromUserName}</b> علّق على صورتك: "${noti.commentText}"</div>`;
            });
        });
    }

    window.viewUserProfile = (userId, userName) => {
        document.getElementById('profile-view-indicator').style.display = 'block';
        document.getElementById('profile-user-name').innerText = `تصفح منشورات المبدع: ${userName}`;
        window.render({ specialFilter: 'otherUser', targetUid: userId });
    };

    window.clearProfileFilter = () => {
        document.getElementById('profile-view-indicator').style.display = 'none';
        window.render('الكل', document.getElementById('btn-all'));
    };

    window.render = async (filter = 'الكل', btn = null) => {
        if(btn) { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = "جاري تحميل المنصة...";
        
        const myId = auth.currentUser ? auth.currentUser.uid : null;
        let q;
        
        if (filter.specialFilter === 'otherUser') {
            q = query(collection(db, "images"), where("userId", "==", filter.targetUid));
        } else if (filter === 'منشوراتي') {
            if(!myId) return;
            document.getElementById('profile-view-indicator').style.display = 'none';
            q = query(collection(db, "images"), where("userId", "==", myId));
        } else {
            document.getElementById('profile-view-indicator').style.display = 'none';
            q = (filter === 'الكل') ? collection(db, "images") : query(collection(db, "images"), where("cat", "==", filter));
        }
        
        const snapshot = await getDocs(q);
        gallery.innerHTML = "";
        
        const commentsSnapshot = await getDocs(collection(db, "comments"));
        const allComments = [];
        commentsSnapshot.forEach(cSnap => allComments.push({id: cSnap.id, ...cSnap.data()}));

        if (snapshot.empty) {
            gallery.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #666; padding: 40px;">لا توجد صور هنا بعد...</div>`;
            return;
        }

        snapshot.forEach((docSnap) => {
            const item = docSnap.data();
            const imgId = docSnap.id;
            const userName = item.userName ? item.userName : "مستخدم مجهول";
            
            const likesArray = item.likes ? item.likes : [];
            const isLiked = likesArray.includes(myId);
            const likesCount = likesArray.length;

            const imgComments = allComments.filter(c => c.imageId === imgId);
            let commentsHtml = "";
            imgComments.forEach(c => {
                const isMyComment = c.userId === myId;
                commentsHtml += `
                    <div class="comment-item" id="comment-container-${c.id}">
                        <div><span class="comment-user">${c.userName}:</span> <span id="text-${c.id}">${c.text}</span></div>
                        ${isMyComment ? `
                            <div class="comment-actions">
                                <button onclick="window.editComment(event, '${c.id}', '${c.text}')" title="تعديل">✏️</button>
                                <button onclick="window.deleteComment(event, '${c.id}')" title="حذف">🗑️</button>
                            </div>
                        ` : ''}
                    </div>`;
            });

            gallery.innerHTML += `
                <div class="photo-card" id="card-${imgId}">
                    <span class="user-tag" onclick="window.viewUserProfile('${item.userId}', '${userName}')">بواسطة: ${userName}</span>
                    ${(myId && item.userId === myId) ? `<button class="del-btn" onclick="window.deleteImage(event, '${imgId}')">×</button>` : ''}
                    
                    <img class="photo-img" src="${item.src}" onclick="window.openLightboxImage(event, '${item.src}')">
                    
                    <div class="interaction-bar">
                        <button class="like-container" id="like-btn-container-${imgId}" onclick="window.toggleLike(event, '${imgId}', ${JSON.stringify(likesArray)})">
                            <span class="like-btn ${isLiked ? 'liked' : ''}" id="heart-${imgId}">${isLiked ? '❤️' : '🤍'}</span>
                            <span class="like-count" id="count-${imgId}">${likesCount} إعجاب</span>
                        </button>
                        <a href="${item.src}" download style="text-decoration:none; font-size:14px; color:var(--accent);">📥 تحميل</a>
                    </div>
                    
                    <div class="comments-section">
                        <div class="comments-list" id="comments-list-${imgId}">
                            ${commentsHtml ? commentsHtml : `<span id="no-comment-msg-${imgId}" style="color:#666; font-size:11px;">لا توجد تعليقات بعد...</span>`}
                        </div>
                        <div class="comment-input-box">
                            <input type="text" id="input-${imgId}" placeholder="اكتب تعليقاً..." onkeydown="if(event.key==='Enter') window.addComment(event, '${imgId}', '${item.userId}')">
                            <button class="comment-btn" onclick="window.addComment(event, '${imgId}', '${item.userId}')">نشر</button>
                        </div>
                    </div>
                </div>
            `;
        });
    };

    window.toggleLike = async (event, imageId, likesArray) => {
        if(event) event.preventDefault();
        if(!auth.currentUser) { alert("يجب تسجيل الدخول للتفاعل والإعجاب بالصور!"); return; }
        const myId = auth.currentUser.uid;
        const imageRef = doc(db, "images", imageId);
        
        let updatedLikes = [...likesArray];
        let hasLiked = updatedLikes.includes(myId);
        
        if (hasLiked) { updatedLikes = updatedLikes.filter(id => id !== myId); } 
        else { updatedLikes.push(myId); }
        
        const heartEl = document.getElementById(`heart-${imageId}`);
        const countEl = document.getElementById(`count-${imageId}`);
        const containerEl = document.getElementById(`like-btn-container-${imageId}`);
        
        if(heartEl && countEl) {
            heartEl.innerText = hasLiked ? '🤍' : '❤️';
            heartEl.classList.toggle('liked');
            countEl.innerText = `${updatedLikes.length} إعجاب`;
            containerEl.setAttribute("onclick", `window.toggleLike(event, '${imageId}', ${JSON.stringify(updatedLikes)})`);
        }

        try { await updateDoc(imageRef, { likes: updatedLikes }); } catch (error) { console.error(error); }
    };

    window.addComment = async (event, imageId, postOwnerId) => {
        if(event) event.preventDefault();
        if(!auth.currentUser) { alert("يجب تسجيل الدخول لكتابة تعليق!"); return; }
        const input = document.getElementById(`input-${imageId}`);
        const text = input.value.trim(); if(!text) return;
        const currentUserId = auth.currentUser.uid;
        const currentUserName = auth.currentUser.displayName;
        
        input.value = ""; 

        try {
            const docRef = await addDoc(collection(db, "comments"), { imageId, text, userId: currentUserId, userName: currentUserName, timestamp: Date.now() });
            
            const listEl = document.getElementById(`comments-list-${imageId}`);
            const noMsg = document.getElementById(`no-comment-msg-${imageId}`);
            if(noMsg) noMsg.remove();
            
            const newCommentHtml = `
                <div class="comment-item" id="comment-container-${docRef.id}">
                    <div><span class="comment-user">${currentUserName}:</span> <span id="text-${docRef.id}">${text}</span></div>
                    <div class="comment-actions">
                        <button onclick="window.editComment(event, '${docRef.id}', '${text}')" title="تعديل">✏️</button>
                        <button onclick="window.deleteComment(event, '${docRef.id}')" title="حذف">🗑️</button>
                    </div>
                </div>`;
            listEl.insertAdjacentHTML('beforeend', newCommentHtml);

            if (postOwnerId !== currentUserId) {
                await addDoc(collection(db, "notifications"), { toUserId: postOwnerId, fromUserId: currentUserId, fromUserName: currentUserName, commentText: text, imageId, timestamp: Date.now() });
            }
        } catch (error) { console.error(error); }
    };

    window.editComment = async (event, commentId, oldText) => {
        if(event) event.preventDefault();
        const newText = prompt("تعديل التعليق:", oldText);
        if(!newText || newText.trim() === oldText) return;
        
        const textEl = document.getElementById(`text-${commentId}`);
        if(textEl) textEl.innerText = newText.trim();

        try { await updateDoc(doc(db, "comments", commentId), { text: newText.trim() }); } catch (error) { alert("فشل تعديل التعليق"); }
    };

    window.deleteComment = async (event, commentId) => {
        if(event) event.preventDefault();
        if(confirm("هل تريد حذف هذا التعليق؟")) {
            const commentBox = document.getElementById(`comment-container-${commentId}`);
            if(commentBox) commentBox.remove();
            try { await deleteDoc(doc(db, "comments", commentId)); } catch (error) { alert("فشل حذف التعليق"); }
        }
    };

    window.deleteImage = async (event, id) => {
        if(event) event.preventDefault();
        if(confirm("هل تريد حذف هذه الصورة نهائياً؟")) { 
            const card = document.getElementById(`card-${id}`);
            if(card) card.remove();
            try { await deleteDoc(doc(db, "images", id)); } catch (error) { alert("فشل حذف الصورة"); }
        }
    };

    const compressImage = (file) => {
        return new Promise((resolve, reject) => {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image(); img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > 1200) { height *= 1200 / width; width = 1200; } } 
                    else { if (height > 1200) { width *= 1200 / height; height = 1200; } }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.7);
                };
            };
            reader.onerror = error => reject(error);
        });
    };

    document.getElementById('upload').addEventListener('change', async function(e) {
        const file = e.target.files[0]; if(!file) return;
        const statusText = document.getElementById('upload-status');
        const spinner = document.getElementById('uploadSpinner');
        
        statusText.innerText = "جاري ضغط ورفع الصورة...";
        spinner.style.display = "block";

        try {
            const compressedBlob = await compressImage(file);
            const formData = new FormData(); formData.append("image", compressedBlob, "image.jpg");
            const response = await fetch("https://api.imgbb.com/1/upload?key=2b3d2c06ed007ca38badaa8f97614954", { method: "POST", body: formData });
            const result = await response.json();
            if (result.success) {
                await addDoc(collection(db, "images"), { src: result.data.url, cat: document.getElementById('catSelect').value, userId: auth.currentUser.uid, userName: auth.currentUser.displayName, likes: [] });
                statusText.innerText = "تم الرفع بنجاح! 🎉";
                setTimeout(() => statusText.innerText = "", 3000);
                window.render(); 
            }
        } catch (error) { 
            statusText.innerText = "حدث خطأ أثناء الرفع."; 
        } finally {
            spinner.style.display = "none";
        }
    });
</script>
</body>
</html>
